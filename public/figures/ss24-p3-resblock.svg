  </defs>
  <!-- skip connection (dashed) from F₂ over the top into the adder -->
  <path d="M70,52 V24 H440 V53" fill="none" stroke="#8794a3" stroke-dasharray="5 4" marker-end="url(#ar2)"/>
  <!-- main path arrows -->
  <g stroke="#5b6470" marker-end="url(#ar2)">
    <line x1="91" y1="70" x2="177" y2="70"/>
    <line x1="221" y1="70" x2="307" y2="70"/>
    <line x1="351" y1="70" x2="423" y2="70"/>
    <line x1="455" y1="70" x2="527" y2="70"/>
  </g>
  <g text-anchor="middle" fill="#3a4654">
