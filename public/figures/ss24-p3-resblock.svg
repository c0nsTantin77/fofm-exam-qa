  <text x="440" y="75" text-anchor="middle" font-size="16" fill="#1f2933">+</text>
  <g text-anchor="middle" font-size="9.5" fill="#6b7785">
    <text x="70" y="108">F₂ (1×1×2×2)</text>
    <text x="200" y="108">G₁</text>
    <text x="330" y="108">G₂</text>
    <text x="550" y="108">F₃ (1×1×2×2)</text>
