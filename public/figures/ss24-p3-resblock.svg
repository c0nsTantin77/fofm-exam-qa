    <text x="264" y="62">B</text>
    <text x="387" y="62">C</text>
  </g>
  <!-- boxes + adder -->
  <g stroke="#8794a3">
    <rect x="49" y="52" width="42" height="36" rx="3" fill="#e7ecf2"/>
    <rect x="179" y="52" width="42" height="36" rx="3" fill="#e7ecf2"/>
    <rect x="309" y="52" width="42" height="36" rx="3" fill="#e7ecf2"/>
    <rect x="529" y="52" width="42" height="36" rx="3" fill="#e7ecf2"/>
